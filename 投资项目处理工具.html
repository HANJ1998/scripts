<head>

    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        .container {

        .filter-row {

        .filter-row:first-of-type {

        .filter-row input[type="file"]:hover {

        /* 错误提示样式 */

        /* 投资文件格式说明样式 */

            list-style-type: none;

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 20px;

            h1 {
                font-size: 24px;

<body>
    <div class="container">
        <h1>投资项目处理工具</h1>
        <div class="controls">
            <button id="selectDir">选择目录</button>
            <button id="processFiles" disabled>复制文件</button>
            <button id="regenerateList" disabled>生成列表</button>
        </div>
        <div id="status"></div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-percentage" id="progressPercentage">0%</div>
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText"></div>
        </div>
        <div class="filter-section">
            <h3>按投资额结构筛选文件</h3>
            <div class="format-guide">
                <h4>投资额文件格式要求</h4>
                <ul>
                    <li>文件格式：.xlsx 或 .xls，看示例👇</li>
                </ul>
                <div class="format-example">
                    <table>
                        <tr>
                            <th>项目代码</th>
                            <th>本月新增建安</th>
                            <th>本月新增设备工器具</th>
                            <th>本月新增其他</th>
                        </tr>
                        <tr>
                            <td>MA4F0WYH0420582003</td>
                            <td>5000</td>
                            <td>2000</td>
                            <td>1000</td>
                        </tr>

                    </table>
                </div>
            </div>
            <div class="filter-row">
                <label for="investmentFile">上传投资额文件：</label>
                <input type="file" id="investmentFile" accept=".xlsx,.xls">
            </div>
            <div class="filter-row">
                <label>任一结构投资额：</label>
                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span> ≥ </span>
                        <input type="number" id="investmentValue" placeholder="输入数值" value="5000"
                            style="padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; width: 120px; font-size: 14px;"><span>万元</span>
                    </div>
                </div>
            </div>
            <div class="filter-row">
                <button id="filterFiles" disabled>按投资额筛选</button>
                <button id="generateUnlockFormula" disabled style="margin-left: 10px;">生成解锁公式</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let selectedDirectory = '';
        let rootDirectoryHandle = null;
        let investmentData = new Map(); // 存储项目代码到投资额的映射
        let uploadedInvestmentFile = null;

        // 文件上传事件处理
        document.getElementById('investmentFile').addEventListener('change', async (event) => {
            console.log('📋 [投资额上传] === 开始上传投资额文件 ===');
            const file = event.target.files[0];
            if (!file) {
                console.log('⚠ 未选择文件，取消上传');
                return;
            }

            console.log('📁 选择的文件：', file.name, '（大小：', file.size, '字节）');

            // 检查文件格式
            const fileExtension = file.name.split('.').pop().toLowerCase();
            if (fileExtension !== 'xlsx' && fileExtension !== 'xls') {
                console.error('❌ 无效的文件格式：', fileExtension);
                alert('请上传xlsx或xls格式的文件！');
                return;
            }
            console.log('✓ 文件格式验证通过：', fileExtension);

            uploadedInvestmentFile = file;

            try {
                // 解析Excel文件
                console.log('🔄 开始解析Excel文件...');
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];

                // 使用header:1选项将数据解析为二维数组，避免SheetJS自动识别标题行的问题
                const arrayData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                console.log('✓ Excel文件解析成功，共', arrayData.length, '行数据');

                // 检查数据行数
                if (arrayData.length < 2) {
                    console.error('❌ 文件数据不足，至少需要包含标题行和一行数据');
                    alert('文件数据不足！请确保文件包含标题行和至少一行数据。\n\n格式要求：\n- 第一列：18位项目代码\n- 第二列：本月新增建安\n- 第三列：本月新增设备工器具\n- 第四列：本月新增其他\n- 第一行为标题行');
                    return;
                }

                // 清空之前的数据
                investmentData.clear();

                // 提取项目代码和三个投资额指标
                console.log('📊 [投资额上传] 开始提取项目代码和投资额指标...');
                let validCount = 0;
                let invalidCount = 0;

                arrayData.forEach((row, index) => {
                    // 跳过标题行
                    if (index === 0) {
                        console.log('📋 [投资额上传] 跳过标题行：', JSON.stringify(row));
                        return;
                    }

                    // 获取四列数据：项目代码、本月新增建安、本月新增设备工器具、本月新增其他
                    // 允许某些列为空，将在后续处理中转换为0
                    const projectCode = row[0]?.toString().trim();
                    const jiananStr = row[1];
                    const shebeiStr = row[2];
                    const qitaStr = row[3];

                    const jianan = parseFloat(jiananStr);
                    const shebei = parseFloat(shebeiStr);
                    const qita = parseFloat(qitaStr);

                    // 验证项目代码
                    if (!projectCode) {
                        invalidCount++;
                        console.warn(`⚠️ [投资额上传] 第${index + 1}行项目代码为空：`, JSON.stringify(row));
                        return;
                    }

                    if (projectCode.length !== 18) {
                        invalidCount++;
                        console.warn(`⚠️ [投资额上传] 第${index + 1}行项目代码长度错误（应为18位）：${projectCode}`);
                        return;
                    }

                    // 验证三个投资额指标（允许为空，为空时视为0）
                    const validJianan = isNaN(jianan) ? 0 : jianan;
                    const validShebei = isNaN(shebei) ? 0 : shebei;
                    const validQita = isNaN(qita) ? 0 : qita;

                    // 数据有效，添加到映射
                    investmentData.set(projectCode, {
                        jianan: validJianan,
                        shebei: validShebei,
                        qita: validQita
                    });
                    validCount++;
                    console.log(`✅ [投资额上传] 第${index + 1}行：项目代码=${projectCode}, 建安=${validJianan}万元, 设备=${validShebei}万元, 其他=${validQita}万元`);
                });

                console.log(`📈 [投资额上传] 数据提取完成：有效数据 ${validCount} 条，无效数据 ${invalidCount} 条`);

                // 检查有效数据数量
                if (validCount === 0) {
                    console.error('❌ [投资额上传] 未提取到有效数据，请检查文件格式是否正确');
                    alert('未提取到有效数据！请检查文件格式是否符合要求：\n\n1. 文件格式：.xlsx 或 .xls\n2. 第一列：18位项目代码\n3. 第二列：本月新增建安\n4. 第三列：本月新增设备工器具\n5. 第四列：本月新增其他\n6. 第一行为标题行\n\n示例：\n项目代码            本月新增建安  本月新增设备工器具  本月新增其他\nMA4F0WYH0420582003  5000        2000              1000');
                    return;
                }

                console.log('🗄️ [投资额上传] 最终投资数据：', Object.fromEntries(investmentData));

                updateStatus(`已上传投资额文件，解析到 ${investmentData.size} 个项目（有效：${validCount}条，无效：${invalidCount}条）`);

                // 启用筛选按钮（调用更新函数）
                updateFilterButtonStatus();
                const filterBtn = document.getElementById('filterFiles');
                console.log('🔘 [投资额上传] 筛选按钮状态：', filterBtn.disabled ? '禁用' : '启用');

                console.log('📋 [投资额上传] === 投资额文件上传完成 ===');
            } catch (error) {
                console.error('❌ [投资额上传] 解析投资额文件错误：', error);
                updateStatus(`解析投资额文件错误：${error.message}`);
                alert('解析文件失败：' + error.message + '\n\n请确保文件格式正确：\n1. 文件格式：.xlsx 或 .xls\n2. 第一列：18位项目代码\n3. 第二列：本月新增建安\n4. 第三列：本月新增设备工器具\n5. 第四列：本月新增其他\n6. 第一行为标题行');
            }
        });

        // 输入框事件处理
        function updateFilterButtonStatus() {
            const investmentValue = document.getElementById('investmentValue').value;
            const filterBtn = document.getElementById('filterFiles');

            // 检查数值是否已输入，且投资数据已加载
            filterBtn.disabled = !investmentValue || investmentData.size === 0;

            // 更新生成列表按钮状态
            updateRegenerateButtonStatus();
        }

        // 为输入框添加事件监听器
        document.getElementById('investmentValue').addEventListener('input', updateFilterButtonStatus);

        // 添加生成列表按钮事件监听器
        document.getElementById('regenerateList').addEventListener('click', regenerateProjectList);

        // 添加生成解锁公式按钮事件监听器
        document.getElementById('generateUnlockFormula').addEventListener('click', async () => {
            console.log('📋 [解锁公式] === 开始生成解锁公式 ===');

            if (investmentData.size === 0) {
                console.warn('⚠ [解锁公式] 未上传投资额文件或未解析到数据');
                alert('请先上传投资额文件！');
                return;
            }

            // 生成解锁公式数据
            const unlockFormulaData = [];
            unlockFormulaData.push(['项目代码', '解锁公式']);

            investmentData.forEach((data, projectCode) => {
                const { jianan, shebei, qita } = data;
                const total = jianan + shebei + qita;

                // 生成解锁公式
                const unlockItems = [];
                if (total >= 10000) unlockItems.push('B42001');
                if (jianan >= 5000) unlockItems.push('B42002');
                if (shebei >= 5000) unlockItems.push('B42003');
                if (qita >= 5000) unlockItems.push('B42004');

                const formula = unlockItems.join('、');

                // 只有当公式不为空时才添加到结果中
                if (formula) {
                    unlockFormulaData.push([projectCode, formula]);
                    console.log(`✅ [解锁公式] 项目 ${projectCode} 生成公式：${formula}`);
                } else {
                    console.log(`⏭️ [解锁公式] 项目 ${projectCode} 未生成公式，跳过`);
                }
            });

            console.log('📊 [解锁公式] 生成解锁公式数据：', unlockFormulaData);

            // 生成Excel文件
            const ws = XLSX.utils.aoa_to_sheet(unlockFormulaData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '解锁公式');

            // 下载Excel文件
            const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '解锁公式.xlsx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            console.log('✅ [解锁公式] 解锁公式生成完成');
        });

        // 更新生成解锁公式按钮状态
        function updateGenerateUnlockFormulaButtonStatus() {
            const generateBtn = document.getElementById('generateUnlockFormula');
            generateBtn.disabled = investmentData.size === 0;
        }

        // 修改updateFilterButtonStatus函数，同时更新生成解锁公式按钮状态
        const originalUpdateFilterButtonStatus = updateFilterButtonStatus;
        updateFilterButtonStatus = function () {
            originalUpdateFilterButtonStatus();
            updateGenerateUnlockFormulaButtonStatus();
        };

        // 更新生成列表按钮状态
        function updateRegenerateButtonStatus() {
            const regenerateBtn = document.getElementById('regenerateList');
            // 只要选择了目录且输出文件夹存在，就可以生成列表
            regenerateBtn.disabled = !rootDirectoryHandle;

        // 递归遍历目录，寻找所有符合条件的文件
        async function searchFiles(directoryHandle, currentPath) {
            const files = [];

            for await (const entry of directoryHandle.values()) {
                // 忽略输出文件夹
                if (entry.name === '输出') {
                    console.log(`⏭️ 跳过输出文件夹：${currentPath}/${entry.name}`);
                    continue;
                }

                const fullPath = currentPath ? `${currentPath}/${entry.name}` : entry.name;

                if (entry.kind === 'directory') {
                    // 递归处理子目录
                    const subFiles = await searchFiles(entry, fullPath);
                    files.push(...subFiles);
                } else if (entry.kind === 'file') {
                    const fileName = entry.name.toLowerCase();
                    if (fileName.endsWith('.docx') || fileName.endsWith('.doc') || fileName.endsWith('.wps')) {
                        files.push({
                            handle: entry,
                            name: entry.name,
                            path: fullPath
                        });
                        console.log(`📄 找到符合条件的文件：${fullPath}`);
                    }
                }
            }

            return files;
        }

        /**
         * 递归处理目录，查找所有符合条件的文件
         * @param {FileSystemDirectoryHandle} directoryHandle - 当前目录句柄
         * @param {string} currentPath - 当前目录的相对路径
         * @returns {Promise<void>} - 无返回值
         */
        async function processDirectory(directoryHandle, currentPath) {
            // 遍历目录中的所有条目
            for await (const entry of directoryHandle.values()) {
                // 跳过所有以"结构"开头的文件夹，避免重复处理
                if (entry.name.startsWith('结构')) {
                    continue;
                }

                // 构建完整的相对路径
                const fullPath = currentPath ? `${currentPath}/${entry.name}` : entry.name;

                // 如果是子目录，递归处理
                if (entry.kind === 'directory') {
                    await processDirectory(entry, fullPath);
                }
                // 如果是文件，检查是否为目标文件类型（.docx, .doc, .wps）
                else if (entry.kind === 'file') {
                    const fileName = entry.name.toLowerCase();
                    if (fileName.endsWith('.docx') || fileName.endsWith('.doc') || fileName.endsWith('.wps')) {
                        // 添加到选中文件列表
                        selectedFiles.push({
                            handle: entry,
                            name: entry.name,
                            path: fullPath
                        });
                    }
                }
            }
        }
